{% set name = "tifffile" %}
{% set version = "2023.8.12" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 824956b6d974b9d346aae59932bea862a2ad18fcc2b1a820b6941b7f6ddb2bca

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-build-isolation --no-deps
  entry_points:
    - tifffile = tifffile:main
    - tiffcomment = tifffile.tiffcomment:main
    - tiff2fsspec = tifffile.tiff2fsspec:main
    - lsm2bin = tifffile.lsm2bin:main

requirements:
  host:
    - python 3.9
    - pip
  run:
    - python >=3.9
    - numpy >=1.19.2
    - imagecodecs >=2023.7.10
  run_constrained:
    - matplotlib-base >=3.3

test:
  imports:
    - tifffile
  commands:
    - pip check
    - tifffile --help
    - tiffcomment --help
    - tiff2fsspec --help
  requires:
    - pip
    # build exactly what we need for TileDB Cloud
    - python 3.9
    - brotli 1.0
    - bzip2 1
    - c-blosc2 2.12
    - gcc 14
    - gxx 14
    - giflib 5.2
    - lcms2 2
    - lerc 4
    - libaec 1
    - libavif 0.11
    - libdeflate 1.17
    - libjpeg-turbo 2
    - libpng 1.6
    - libtiff 4.5
    - libwebp 1
    - lz4-c 1.9
    - numpy 1.26
    - openjpeg 2
    - snappy 1.1
    - xz 5
    - zfp 1.0
    - zlib 1.3
    - zstd 1.5

about:
  home: https://github.com/cgohlke/tifffile, https://github.com/conda-forge/tifffile-feedstock
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  summary: Read and write image data from and to TIFF files.
  description: Fork of conda-forge feedstock

extra:
  recipe-maintainers:
    - ihnorton
    - jdblischak
    - jp-dark
